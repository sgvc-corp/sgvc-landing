<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SGVC — Logo 3D Premium</title>
<style>
  :root { color-scheme: dark; }
  html, body {
    height: 100%; margin: 0;
    background:
      linear-gradient(45deg, #111 25%, transparent 25%) -20px 0/40px 40px,
      linear-gradient(-45deg, #111 25%, transparent 25%) -20px 0/40px 40px,
      linear-gradient(45deg, transparent 75%, #111 75%) -20px 0/40px 40px,
      linear-gradient(-45deg, transparent 75%, #111 75%) -20px 0/40px 40px,
      #050505;
    font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  .stage {
    position: relative;
    width: 100%; height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  .stage canvas { width: min(70vmin, 640px); height: min(70vmin, 640px); display: block; }
  .caption {
    position: absolute; bottom: 28px; left: 0; right: 0;
    text-align: center; color: #cdb877; letter-spacing: 0.14em;
    font-size: 11px; text-transform: uppercase; opacity: 0.7;
  }
  .caption strong { color: #D4AF37; }
</style>
</head>
<body>
  <div class="stage">
    <canvas id="logo-canvas"></canvas>
    <p class="caption"><strong>SGVC</strong> — isotipo 3D · oro cepillado · vista isométrica · fondo transparente</p>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="js/sgvc-logo3d.js"></script>
  <script>
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    SGVCLogo3D.create(document.getElementById('logo-canvas'), {
      transparent: true,
      interactive: true,
      autoTilt: true,
      tiltMaxDeg: 4,
      ringPeriod: 20,
      sweepPeriod: 8,
      baseTiltX: 0.5,
      baseTiltY: 0.78, // orientación isométrica clásica (~35°/45°)
      isometric: true,
      reduceMotion
    });
  </script>
</body>
</html>
